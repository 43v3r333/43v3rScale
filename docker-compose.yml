version: '3.8'

services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    volumes:
      - ./backend:/backend
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecret
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend:/backend
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - cvat

  solana-service:
    build: ./solana-service
    environment:
      - SOLANA_RPC_URL=https://api.devnet.solana.com
      - PORT=3001
    ports:
      - "3001:3001"

  # Label Studio
  ls_db:
    image: postgres:16
    environment:
      - POSTGRES_USER=ls_user
      - POSTGRES_PASSWORD=ls_pass
      - POSTGRES_DB=label_studio
    volumes:
      - ls_postgres_data:/var/lib/postgresql/data/

  label-studio:
    image: heartexlabs/label-studio:latest
    expose:
      - "8080"
    depends_on:
      - ls_db
    environment:
      - DJANGO_DB=default
      - POSTGRE_NAME=label_studio
      - POSTGRE_USER=ls_user
      - POSTGRE_PASSWORD=ls_pass
      - POSTGRE_HOST=ls_db
      - POSTGRE_PORT=5432
      - LABEL_STUDIO_AUTH_TOKEN=ls_super_token
    volumes:
      - ls_data:/label-studio/data

  label-studio-proxy:
    image: nginx:alpine
    depends_on:
      - label-studio
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/label-studio.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # CVAT
  cvat_db:
    image: postgres:16
    environment:
      - POSTGRES_USER=cvat_user
      - POSTGRES_PASSWORD=cvat_pass
      - POSTGRES_DB=cvat
    volumes:
      - cvat_postgres_data:/var/lib/postgresql/data/

  cvat_redis:
    image: redis:7

  cvat:
    image: cvat/server:latest
    command: ["bash", "-lc", "./backend_entrypoint.sh init && ./backend_entrypoint.sh run server"]
    ports:
      - "8081:8080"
    depends_on:
      - cvat_db
      - cvat_redis
    environment:
      - CVAT_POSTGRES_HOST=cvat_db
      - CVAT_POSTGRES_PORT=5432
      - CVAT_POSTGRES_NAME=cvat
      - CVAT_POSTGRES_USER=cvat_user
      - CVAT_POSTGRES_PASSWORD=cvat_pass
      - CVAT_REDIS_HOST=cvat_redis
      - CVAT_REDIS_INMEM_HOST=cvat_redis
      - CVAT_REDIS_INMEM_PORT=6379
      - SMOKESCREEN_OPTS=
      - ALLOWED_HOSTS=localhost,127.0.0.1,bookish-doodle-974j66p5gwrrc9x44-3000.app.github.dev,bookish-doodle-974j66p5gwrrc9x44-8081.app.github.dev,cvat
    volumes:
      - cvat_data:/home/django/data

volumes:
  postgres_data:
  ls_postgres_data:
  ls_data:
  cvat_postgres_data:
  cvat_data:
